<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a313d"/>
      <stop offset="0.5" stop-color="#171b22"/>
      <stop offset="1" stop-color="#0b0d10"/>
    </linearGradient>
    <linearGradient id="topSheen" x1="512" y1="0" x2="512" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="frontStroke" x1="228" y1="375" x2="606" y2="753" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#77b8ff"/>
      <stop offset="0.55" stop-color="#4fa3ff"/>
      <stop offset="1" stop-color="#2f83e6"/>
    </linearGradient>
    <filter id="frontGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#4fa3ff" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- macOS icon grid: rounded body is 824x824 centred in 1024 (100px margin) -->
  <g transform="translate(100,100) scale(0.8046875)">
    <!-- app chrome background -->
    <rect x="0" y="0" width="1024" height="1024" rx="228" fill="url(#bg)"/>
    <rect x="0" y="0" width="1024" height="1024" rx="228" fill="url(#topSheen)"/>
    <rect x="6" y="6" width="1012" height="1012" rx="222" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

    <!-- back frame (gray, upper-right) -->
    <rect x="417.5" y="270.5" width="378" height="378" rx="63"
          fill="none" stroke="#9aa3b0" stroke-opacity="0.6" stroke-width="40"/>

    <!-- front frame (accent blue, lower-left) -->
    <g filter="url(#frontGlow)">
      <rect x="228.5" y="375.5" width="378" height="378" rx="63"
            fill="none" stroke="url(#frontStroke)" stroke-width="52"/>
    </g>
  </g>
</svg>
