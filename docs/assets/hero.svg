<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1048 673" width="1048" height="673" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace" role="img" aria-label="Neoview — three synchronized slice views (planes XY, XZ, YZ) and a 3D raycast render, with a status bar readout">
  <defs>
    <!-- pane blobs -->
    <radialGradient id="gGray" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#d7dde6"/>
      <stop offset="42%" stop-color="#8f98a6"/>
      <stop offset="70%" stop-color="#3b4250"/>
      <stop offset="100%" stop-color="#3b4250" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3D" cx="44%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="22%" stop-color="#78b8ff" stop-opacity="0.72"/>
      <stop offset="46%" stop-color="#4fa3ff" stop-opacity="0.36"/>
      <stop offset="68%" stop-color="#1e3c6e" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#1e3c6e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3Dbg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#0d1622"/>
      <stop offset="60%" stop-color="#070a10"/>
      <stop offset="100%" stop-color="#05060a"/>
    </radialGradient>
    <linearGradient id="gChrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1e25"/>
      <stop offset="100%" stop-color="#12151a"/>
    </linearGradient>

    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="drop" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#0b0f18" flood-opacity="0.42"/>
    </filter>

    <clipPath id="clipFrame"><rect x="24" y="24" width="1000" height="625" rx="16"/></clipPath>
    <clipPath id="pXY"><rect x="25" y="93" width="497" height="273"/></clipPath>
    <clipPath id="pXZ"><rect x="526" y="93" width="497" height="273"/></clipPath>
    <clipPath id="pYZ"><rect x="25" y="368" width="497" height="253"/></clipPath>
    <clipPath id="p3D"><rect x="526" y="368" width="497" height="253"/></clipPath>
  </defs>

  <!-- window frame -->
  <g filter="url(#drop)">
    <rect x="24" y="24" width="1000" height="625" rx="16" fill="#1f242c"/>
  </g>

  <g clip-path="url(#clipFrame)">
    <!-- seam background (shows as thin gutters between panes) -->
    <rect x="24" y="68" width="1000" height="581" fill="#20242c"/>

    <!-- chrome bar -->
    <rect x="24" y="24" width="1000" height="44" fill="url(#gChrome)"/>
    <circle cx="52" cy="46" r="6.5" fill="#ff5f57"/>
    <circle cx="74" cy="46" r="6.5" fill="#febc2e"/>
    <circle cx="96" cy="46" r="6.5" fill="#28c840"/>
    <text x="524" y="50" text-anchor="middle" font-size="13" fill="#5c6570">Neoview — volume.nii.gz</text>

    <!-- ===== PLANE XY (top-left) ===== -->
    <rect x="25" y="93" width="497" height="273" fill="#05060a"/>
    <g clip-path="url(#pXY)">
      <ellipse cx="273" cy="235" rx="150" ry="82" fill="url(#gGray)" filter="url(#soft)"/>
      <line x1="25" y1="243" x2="522" y2="243" stroke="#4fa3ff" stroke-opacity="0.5" stroke-width="1"/>
      <line x1="258" y1="93" x2="258" y2="366" stroke="#4fa3ff" stroke-opacity="0.5" stroke-width="1"/>
    </g>
    <text x="39" y="115" font-size="12.5" fill="#9aa3b0" letter-spacing="1.2">PLANE XY</text>
    <text x="508" y="115" text-anchor="end" font-size="12.5" fill="#5c6570">z 62/128</text>

    <!-- ===== PLANE XZ (top-right) ===== -->
    <rect x="526" y="93" width="497" height="273" fill="#05060a"/>
    <g clip-path="url(#pXZ)">
      <ellipse cx="785" cy="228" rx="162" ry="70" fill="url(#gGray)" filter="url(#soft)"/>
      <line x1="526" y1="213" x2="1023" y2="213" stroke="#4fa3ff" stroke-opacity="0.5" stroke-width="1"/>
      <line x1="788" y1="93" x2="788" y2="366" stroke="#4fa3ff" stroke-opacity="0.5" stroke-width="1"/>
    </g>
    <text x="540" y="115" font-size="12.5" fill="#9aa3b0" letter-spacing="1.2">PLANE XZ</text>
    <text x="1009" y="115" text-anchor="end" font-size="12.5" fill="#5c6570">y 88/160</text>

    <!-- ===== PLANE YZ (bottom-left) ===== -->
    <rect x="25" y="368" width="497" height="253" fill="#05060a"/>
    <g clip-path="url(#pYZ)">
      <ellipse cx="255" cy="498" rx="128" ry="86" fill="url(#gGray)" filter="url(#soft)"/>
      <line x1="25" y1="515" x2="522" y2="515" stroke="#4fa3ff" stroke-opacity="0.5" stroke-width="1"/>
      <line x1="243" y1="368" x2="243" y2="621" stroke="#4fa3ff" stroke-opacity="0.5" stroke-width="1"/>
    </g>
    <text x="39" y="390" font-size="12.5" fill="#9aa3b0" letter-spacing="1.2">PLANE YZ</text>
    <text x="508" y="390" text-anchor="end" font-size="12.5" fill="#5c6570">x 74/128</text>

    <!-- ===== 3D (bottom-right) ===== -->
    <rect x="526" y="368" width="497" height="253" fill="url(#g3Dbg)"/>
    <g clip-path="url(#p3D)">
      <circle cx="775" cy="495" r="96" fill="#4fa3ff" fill-opacity="0.12" filter="url(#glow)"/>
      <ellipse cx="775" cy="495" rx="118" ry="112" fill="url(#g3D)"/>
    </g>
    <text x="1009" y="390" text-anchor="end" font-size="12.5" fill="#4fa3ff">3D · MIP</text>

    <!-- ===== status bar ===== -->
    <rect x="24" y="621" width="1000" height="28" fill="#12151a"/>
    <line x1="24" y1="621" x2="1024" y2="621" stroke="#262b33" stroke-width="1"/>
    <text x="40" y="639" font-size="12" fill="#9aa3b0">voxel <tspan fill="#e8ebf0">[74, 88, 62]</tspan></text>
    <text x="214" y="639" font-size="12" fill="#5c6570">·</text>
    <text x="232" y="639" font-size="12" fill="#9aa3b0">world <tspan fill="#e8ebf0">−3.2, 11.8, 6.0 mm</tspan></text>
    <text x="470" y="639" font-size="12" fill="#5c6570">·</text>
    <text x="488" y="639" font-size="12" fill="#9aa3b0">intensity <tspan fill="#e8ebf0">418</tspan> <tspan fill="#5c6570">(raw 209)</tspan></text>
    <text x="700" y="639" font-size="12" fill="#5c6570">·</text>
    <text x="718" y="639" font-size="12" fill="#9aa3b0">range <tspan fill="#e8ebf0">18 – 962</tspan></text>
  </g>

  <!-- frame border -->
  <rect x="24" y="24" width="1000" height="625" rx="16" fill="none" stroke="#333a45" stroke-width="1"/>
</svg>
