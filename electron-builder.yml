appId: com.neoview.app
productName: neoview
directories:
  buildResources: build
# Whitelist, not blacklist: stray workspace files (editor/agent dirs, docs)
# must never reach the package. package.json is always included implicitly.
files:
  - out/**
  - resources/**
asarUnpack:
  - resources/**
# Chromium's built-in dialog translations; the app UI itself is English-only.
# Both naming schemes per language: electron-builder matches locale file names
# exactly, and macOS ships en.lproj/zh_CN.lproj while Windows/Linux ship
# en-US.pak/zh-CN.pak — listing only one form empties locales/ on the other
# platforms, which breaks DevTools there (no locale strings to load).
electronLanguages:
  - en
  - en-US
  - zh_CN
  - zh-CN
compression: maximum
fileAssociations:
  - ext: nii
    name: Volume file
    role: Viewer
win:
  executableName: neoview
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  category: public.app-category.utilities
  # The in-app updater only ever downloads the dmg; the default target set
  # would also build a zip nobody consumes.
  target:
    - dmg
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  identity: '-'
  notarize: false
# Arch in the name so the in-app updater never offers an arm64 dmg to an Intel
# Mac (or vice versa); the checker keys off the arch token in the asset name.
dmg:
  artifactName: ${name}-${version}-${arch}.${ext}
# Recompresses dmgs to LZMA; the format enum above `compression` tops out at
# bzip2 (~17% larger).
afterAllArtifactBuild: ./scripts/dmg-lzma.mjs
linux:
  target:
    - AppImage
    - deb
  maintainer: neoview
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
