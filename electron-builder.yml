appId: com.neoview.app
productName: neoview
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!scripts/*'
  - '!tests/*'
  - '!testdata/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
# Chromium's built-in dialog translations; the app UI itself is English-only.
electronLanguages:
  - en
  - zh_CN
compression: maximum
fileAssociations:
  - ext: nii
    name: Volume file
    role: Viewer
win:
  executableName: neoview
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  category: public.app-category.utilities
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  identity: '-'
  notarize: false
# Arch in the name so the in-app updater never offers an arm64 dmg to an Intel
# Mac (or vice versa); the checker keys off the arch token in the asset name.
dmg:
  artifactName: ${name}-${version}-${arch}.${ext}
linux:
  target:
    - AppImage
    - deb
  maintainer: neoview
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
